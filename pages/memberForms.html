<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Our Styling -->
        <link rel="stylesheet" href="../../styles/styles.css">

        <!-- Phosphor Icons -->
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/duotone/style.css"/>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    </head>

    <body>
        <div class="flex-row flex-gutters flex-col-2 dark-banner">
            <div class="grid-cell">
                <div class="page-info">
                    <span style="color: var(--text-display);"><p class="bodyS">Home > About Us > System Overview</p></span>
                    <span style="color: var(--text-display);"><p class="headingXL">INPRS Forms</p></span>
                    <span style="color: var(--text-display);"><p class="bodyM">Find and download forms for your retirement fund. Use the filters below to narrow by fund or category.</p></span>
                </div>
            </div>
            <div class="grid-cell">
                <div class="dark-banner-thumbnail">
                    <!-- <img src="./?a=1031663" class="banner-illustration" alt="" /> -->
                     <img src="../images/HeaderImages/INem-crop.png" class="banner-illustration" alt="" />
                </div>
            </div>
        </div>

            <div class="wrapper inprs-forms">
                <!-- Filter Bar -->
                <div class="filters">
                    <div class="dropdown-container">
                        <label for="fund-filter" class="labelM">Fund</label>
                        <select class="dropdown-input" id="fund-filter">
                            <option value="All Funds">All Funds</option>
                            <option value="Shared – Multiple Funds">Multiple Funds</option>
                            <option value="PERF">PERF</option>
                            <option value="TRF">TRF</option>
                            <option value="1977 Fund">1977 Fund</option>
                            <option value="JRS">JRS</option>
                            <option value="PARF">PARF</option>
                            <option value="EG&amp;C Fund">EG&amp;C Fund</option>
                            <option value="LRS">LRS</option>
                        </select>
                    </div>

                    <div class="dropdown-container">
                        <label for="cat-filter" class="labelM">Category</label>
                        <select class="dropdown-input" id="cat-filter">
                            <option value="">All Categories</option>
                        </select>
                    </div>

                    <button class="button-gray-subtle" id="reset-btn">Clear filters</button>
                </div>

                <!-- Result Count -->
                <p class="result-count" id="result-count"></p>

                <!-- Table -->
                <div class="table-div" id="forms-table">
                    <div class="table-header">
                        <div class="table-cell col-title"><span class="labelM">Form title</span></div>
                        <div class="table-cell col-category"><span class="labelM">Category</span></div>
                        <div class="table-cell col-applies"><span class="labelM">Applies to</span></div>
                        <div class="table-cell col-doc"><span class="labelM">Document</span></div>
                    </div>
                    
                    <div id="table-body"></div>
                </div>
            </div>
            
        
        <script src="../javascript/forms.js" async defer></script>
        <script src="../javascript/sidenavigation.js" async defer></script>
        <script src="../javascript/dropdown.js" async defer></script>

    </body>

</html>
