        <style>
    /* ── Design tokens (subset of variables.css) ── */
    :root {
      --font-family: "Figtree", sans-serif;

      --text-bold: #181818;
      --text-brand-blue: #1C2674;
      --text-inverse: #FEFEFE;
      --text-label: #6F6F6F;

      --bg-default: #FEFEFE;
      --bg-subtle: #FAFBFF;
      --bg-brand-blue: #1C2674;
      --bg-brand-blue-hover: #151D57;
      --bg-brand-yellow: #FAB32F;
      --bg-brand-yellow-hover: #DB9D29;
      --bg-gray-subtle-hover: #EBEBEB;
      --bg-gray-subtler-hover: #D8D8D8;

      --border-subtle: #B1B1B1;
      --border-brand-blue: #1C2674;

      --light-gray: #D8D8D8;
    }

    * { font-family: var(--font-family) !important; box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Logo ── */
    .nav-logo {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-icon {
      height: 3rem;
      width: auto;
    }

    .brand-name {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .brand-name .line1 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-brand-blue);
    }

    .brand-name .line2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-brand-blue);
    }

    /* ── Nav links ── */
    .navbar-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex: 1;
      justify-content: center;
    }

    /* ── Nav item (plain link) ── */
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-brand-blue);
      white-space: nowrap;
      transition: background-color 0.15s;
      cursor: pointer;
      background: none;
      border: none;
    }

    .nav-link:hover,
    .nav-link.open {
      background-color: var(--bg-gray-subtle-hover);
      color: var(--text-brand-blue);
    }

    .nav-link .caret {
      font-size: 1rem;
      transition: transform 0.2s ease;
      color: var(--text-brand-blue);
    }

    .nav-link.open .caret {
      transform: rotate(180deg);
    }

    /* ── Dropdown wrapper ── */
    .dropdown-container {
      position: relative;
      /* override inputs.css width constraints for nav use */
      max-width: none !important;
      width: auto !important;
      margin-bottom: 0 !important;
    }

    /* ── Dropdown menu (reusing inputs.css classes) ── */
    .dropdown-menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0;
      min-width: 240px;
      background: var(--bg-default);
      border-radius: 0.5rem;
      box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.12);
      padding: 0.5rem;
      z-index: 200;
    }

    .dropdown-menu.open {
      display: flex;
    }

    .dropdown-menu-item {
      padding: 0.65rem 0.75rem;
      border-radius: 0.375rem;
      text-decoration: none;
      color: var(--text-bold);
      font-size: 15px;
      font-weight: 400;
      transition: background-color 0.15s;
      white-space: nowrap;
    }

    .dropdown-menu-item:hover {
      background-color: var(--bg-gray-subtle-hover);
    }

    /* ── Header actions ── */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .search-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 6px;
      color: var(--text-brand-blue);
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      transition: background-color 0.15s;
    }

    .search-btn:hover {
      background-color: var(--bg-gray-subtle-hover);
    }

    

    /* ── SVG logo (inline pyramid) ── */
    .inprs-logo {
      height: 48px;
      width: auto;
    }
  </style>

</head>
<body>

    <script>
    // Generic dropdown toggle — works for any number of dropdowns
    document.querySelectorAll('.dropdown-container').forEach(container => {
        const btn  = container.querySelector('.nav-link');
        const menu = container.querySelector('.dropdown-menu');

        btn.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = menu.classList.contains('open');

        // Close all open menus first
        document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.nav-link.open').forEach(b => {
            b.classList.remove('open');
            b.setAttribute('aria-expanded', 'false');
        });

        if (!isOpen) {
            menu.classList.add('open');
            btn.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
        }
        });
    });

    // Click outside to close
    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.nav-link.open').forEach(b => {
        b.classList.remove('open');
        b.setAttribute('aria-expanded', 'false');
        });
    });

    // Keyboard: Escape closes
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
        document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.nav-link.open').forEach(b => {
            b.classList.remove('open');
            b.setAttribute('aria-expanded', 'false');
        });
        }
    });
    </script>

        <script src="../javascript/dropdown.js" async defer></script>
